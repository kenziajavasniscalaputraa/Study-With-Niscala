<!DOCTYPE html>
<html>
    <head>
        <title>Strong, Emphasis, dan Blockquote</title>
    </head>
    <body>

        <!-- Strong <strong> buat ngebold tulisan untuk makna penting -->
        
        <!-- Blockquote <blockquote> kaya ngasi spasi gitu -->

        <!-- Emphasis <em> untuk menekankan arti suatu kata tulisanya akan tampil italic     -->
                
        <p><strong>Perhatian:</strong>Jangan tidur di kelas!</p>

        <blockquote>Tolong perhatikan gurunya yang sedang mengajar</blockquote>

        <p><em>Makasih</em> atas perhatianya</p>
    </body>
</html>
