        <!-- List yg ada ordered list <ol> -->
        <h4>Ordered list</h4>
        <!-- List item <li> -->
        <ol>
            <li>Kenzia Javas Niscala Putra</li>
            <li>Goyounjung</li>
            <li>Kim Minju</li>

        <h4>Unordered list</h4>    
        <!-- List yg ga ada urutanya unordered list <ul> -->
            <ul>
            <li>Kenzia Javas Niscala Putra</li>
            <li>Goyounjung</li>
            <li>Kim Minju</li>
            </ul>

            <h4>Defination list</h4>
            <!-- Definition list <dl> -->
            <dl>
                <dt>Absen murid yang ga masuk hari ini</dt>
                <dd>Kim Minju</dd>
            </dl>
            
        </ol>
    </body>
</html>
